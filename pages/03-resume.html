    <!-- RESUME PAGE -->
    <main id="resume-page-v2" class="resume-page-shell-v2">

        <!-- HERO -->
        <section class="resume-hero-v2">
            <div>
                <p class="section-eyebrow" data-resume-copy="heroEyebrow"></p>
                <h1 data-resume-copy="heroTitle"></h1>

                <p class="resume-lead-v2" data-resume-copy="heroLead"></p>
            </div>

            <div class="resume-hero-side-card">
                <span data-resume-copy="quickSummaryLabel"></span>
                <div class="resume-hero-kpis" id="resume-hero-kpis"></div>
            </div>
        </section>

        <!-- SCROLLING RESUME -->
        <section class="resume-scroll-layout">

            <div class="resume-simple-tabs" aria-label="Resume sections">
                <button type="button" class="active" id="tab-overview" data-resume-nav="overview" onclick="return resumeButton('overview')">
                    <i class="fa-solid fa-house"></i>
                    Overview
                </button>

                <button type="button" id="tab-education" data-resume-nav="education" onclick="return resumeButton('education')">
                    <i class="fa-solid fa-graduation-cap"></i>
                    Education
                </button>

                <button type="button" id="tab-experience" data-resume-nav="experience" onclick="return resumeButton('experience')">
                    <i class="fa-solid fa-briefcase"></i>
                    Experience
                </button>

                <button type="button" id="tab-projects" data-resume-nav="projects" onclick="return resumeButton('projects')">
                    <i class="fa-solid fa-diagram-project"></i>
                    Projects
                </button>

                <button type="button" id="tab-skills" data-resume-nav="skills" onclick="return resumeButton('skills')">
                    <i class="fa-solid fa-toolbox"></i>
                    Skills
                </button>

                <a href="assets/resume/Sagnik_Resume_Full.pdf" target="_blank">
                    <i class="fa-solid fa-download"></i>
                    Download CV
                </a>
            </div>

            <section class="resume-dynamic-panel">
                <div id="resume-content"></div>
            </section>

        </section>
    </main>

    <!-- POSTER MODAL -->
    <div id="poster-modal" class="poster-modal">
        <span class="poster-close" data-modal-close>&times;</span>
        <img id="poster-modal-img" class="poster-modal-img" src="" alt="Expanded poster">
    </div>

    <!-- CONTACT ICONS -->
    <section class="home-contact-strip" aria-label="Contact links">
        <a href="mailto:sagnikch@umd.edu" aria-label="Email Sagnik">

        </a>

        <a href="https://github.com/Sagnik-Chakravarty" target="_blank" aria-label="GitHub profile">
            <i class="fa-brands fa-github"></i>
        </a>

        <a href="https://www.linkedin.com/in/sagnik-chakravarty" target="_blank" aria-label="LinkedIn profile">
            <i class="fa-brands fa-linkedin"></i>
        </a>
    </section>
